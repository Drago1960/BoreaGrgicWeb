<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOREA GRGIĆ | Contact</title>
    <link rel="stylesheet" href="css/style.css"></head><body>
  <main>
    <div class="page-header">
      <h1>Contact Us</h1>
      <h2>Let's start your next project together</h2>
    </div>
    
    <div style="text-align: center; max-width: 600px; margin: 0 auto;">
      <p>Whether you have specific requirements for a custom furniture piece or technical questions regarding our CNC software solutions, feel free to reach out.</p>
      
      <!-- KONTAKT FORMA -->
      <form action="https://api.web3forms.com/submit" method="POST" style="margin-top: 40px; text-align: left; background: rgba(0,0,0,0.02); padding: 30px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.05);">

        <input type="hidden" name="access_key" value="5d911afe-9945-43cc-bc84-ce2a514f6766">

        <input type="hidden" name="redirect" value="https://boreagrgic.github.io/BoreaGrgicWeb/thanks.html">

        <div style="margin-bottom: 20px;">
          <label for="name" style="display: block; font-weight: bold; margin-bottom: 5px;">Your Name</label>
          <input type="text" id="name" name="name" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
          <label for="email" style="display: block; font-weight: bold; margin-bottom: 5px;">Email Address</label>
          <input type="email" id="email" name="email" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
          <label for="subject" style="display: block; font-weight: bold; margin-bottom: 5px;">Subject</label>
          <input type="text" id="subject" name="subject" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 25px;">
          <label for="message" style="display: block; font-weight: bold; margin-bottom: 5px;">Message</label>
          <textarea id="message" name="message" rows="6" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: vertical; font-family: inherit;"></textarea>
        </div>

        <button type="submit" class="btn btn-solid" style="width: 100%; padding: 12px; font-weight: bold; cursor: pointer;">Send Message</button>
      </form>

    </div>
  </main>

  <footer><p>&copy; 2026 BOREA GRGIĆ. All rights reserved.</p></footer>
  <script src="js/main.js"></script>
  <script src="js/navigacija.js"></script></body></html>
